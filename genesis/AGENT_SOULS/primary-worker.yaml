schema_version: 1
agent_id: primary-worker
soul_version: 2
extends_soul_hash: 80be3a73132dbaeb5f65edcb791177fbcfe0ebe838776f6b82d2e6711626f268
property_promised: User-facing cognition emits Candidate objects only; user-visible Response construction remains downstream of Arbiter approval.
invariants_touched:
  - 1
  - 4
  - 5
  - 6
  - 11
  - 14
  - 15
verification: xion-verify agent-souls; xion-verify cognition; xion-verify agent-cast
