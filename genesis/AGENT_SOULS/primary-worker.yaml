trigger:
  type: user_turn
allowed_tools:
  - xion.inference.generate
  - xion.cognition.retrieve_context
  - xion.journal.append_turn
forbidden_tools:
  - hermes.tool.shell
  - hermes.tool.web_post
  - hermes.tool.mcp_auto_discover
  - hermes.tool.user_model_export
mcp_servers_allowed: []
cost_envelope:
  monthly_envelope_fraction: 0.15
  unit: fraction_of_operating_float
  bucket: cognition/primary
output_destinations:
  - type: candidate
    name: Candidate
arbiter_class: user_visible_candidate
limits:
  max_turn_depth: 0
  max_wall_clock_s: 60
  max_tokens_per_run: 12000
deprecation_path:
  replaced_by: primary-worker-v2
  shadow_cast_required: true
  arbiter_parity_required: true
