# Xion Relay — Akash SDL (mainnet blueprint)
#
# Important findings (operator, 2026-04-26):
# - placement.pricing.*.denom MUST be `uact` (compute credits). Using `uakt` yields
#   deposit / denomination errors at `tx deployment create`; escrow spends `uact`.
#   Fund via `provider-services tx bme mint-act <uakt>uakt --from ...` and wait until
#   `query bme ledger` shows executed + `query bank balances` lists `uact`.
# - `placement` name (`akash` here) must match `deployment.<service>.<same-name>`.
# - `storage` for compute profiles should be a list (`- size: ...`) per SDL v2 syntax.
# - `amount` under pricing is max bid per block in uact; tune for market (100 is an example).
# - `xion-ollama` is intentionally GPU-backed for the Gemma 4 floor; start at
#   10000 uact/block and tune from observed `bid list` rather than from CPU bids.
# - Image must be pullable by providers (public Docker Hub / GHCR); see docs/runbooks/AKASH_RELAY_DEPLOY.md.
# - Closure pass (2026-05-06): manifest/ingress flakes observed on some bidders; record in
#   genesis/DEPLOYMENT_RECORDS/relay-akash-closure-2026-05-06.json; retry with
#   --exclude-provider akash1sevd2ymtty3dpq9ycxgkhuzzk4fe6mchqdwd4e and optional
#   --prefer-provider akash1st7fqtuqk6hj06fkkavq0fxtw0w9sm4zzt3r5g (see runbook).
version: "2.0"
services:
  xion-relay:
    image: nikhilkadalge/xion-relay:pre-genesis-akash-wall120
    command:
      - /bin/sh
      - -lc
      - |
        python - <<'PY'
        import json
        import os
        import time
        import urllib.request

        base_url = os.environ.get("XION_OLLAMA_URL", "http://xion-ollama:11434").rstrip("/")
        tags_url = base_url + "/api/tags"
        generate_url = base_url + "/api/generate"
        wanted = os.environ.get("XION_OLLAMA_FLOOR_MODEL", "gemma4:e4b-it-q4_K_M")
        deadline = time.monotonic() + int(os.environ.get("XION_OLLAMA_BOOT_WAIT_S", "900"))

        while time.monotonic() < deadline:
            try:
                with urllib.request.urlopen(tags_url, timeout=5) as response:
                    body = json.loads(response.read().decode("utf-8"))
                names = {model.get("name") for model in body.get("models", []) if isinstance(model, dict)}
                if wanted in names:
                    payload = json.dumps(
                        {"model": wanted, "prompt": "ping", "stream": False, "options": {"num_predict": 1}}
                    ).encode("utf-8")
                    request = urllib.request.Request(
                        generate_url,
                        data=payload,
                        method="POST",
                        headers={"Content-Type": "application/json"},
                    )
                    with urllib.request.urlopen(request, timeout=60) as response:
                        if not (200 <= response.status < 300):
                            raise RuntimeError(f"generate returned HTTP {response.status}")
                        response.read()
                    print(f"State-of-Xion: Ollama floor model ready: {wanted}", flush=True)
                    break
                print(f"State-of-Xion: waiting for Ollama floor model {wanted}; seen={sorted(names)}", flush=True)
            except Exception as exc:
                print(f"State-of-Xion: waiting for Ollama readiness at {base_url}: {exc}", flush=True)
            time.sleep(5)
        else:
            raise SystemExit(f"State-of-Xion: Ollama floor model {wanted} was not ready before timeout")
        PY
        exec /usr/local/bin/entrypoint-xion-orchestrator-api.sh
    expose:
      - port: 8443
        as: 443
        to:
          - global: true
    env:
      - XION_API_HOST=0.0.0.0
      - XION_API_PORT=8443
      - XION_API_WORKERS=1
      - XION_API_REQUIRE_BEARER=false
      - XION_BILLING_REQUIRED=false
      - XION_CAST_POOL_ON_BOOT=false
      - XION_CHAT_DEADLINE_S=120
      - XION_COGNITION_WALL_S=120
      - XION_INFERENCE_POLICY=hosted_api_first
      # The open-weights floor must live inside the deployed substrate, not on
      # the operator laptop. The sidecar below serves the same Ollama API the
      # local D2 posture uses.
      - XION_OLLAMA_URL=http://xion-ollama:11434
      - XION_OLLAMA_FLOOR_MODEL=gemma4:e4b-it-q4_K_M
      - XION_PAYMENT_LEDGER=/app/data/PAYMENT_LEDGER.jsonl
      - XION_SENSORIUM_LEDGER=/app/data/SENSORIUM_LEDGER.jsonl
      - XION_SAFETY_LEDGER=/app/data/SAFETY_LEDGER.jsonl
      - XION_REQUEST_LEDGER=/app/data/REQUEST_LEDGER.jsonl
      - XION_ANCHOR_DB_PATH=/app/data/ANCHOR_LEDGER.jsonl
  xion-ollama:
    image: ollama/ollama:0.21.0
    command:
      - /bin/sh
      - -lc
      - |
        ollama serve &
        pid="$!"
        until ollama list >/dev/null 2>&1; do sleep 2; done
        ollama pull "${XION_OLLAMA_FLOOR_MODEL:-gemma4:e4b-it-q4_K_M}"
        wait "$pid"
    expose:
      - port: 11434
        as: 11434
        to:
          - service: xion-relay
    env:
      - OLLAMA_HOST=0.0.0.0:11434
      - XION_OLLAMA_FLOOR_MODEL=gemma4:e4b-it-q4_K_M
profiles:
  compute:
    xion-relay:
      resources:
        cpu:
          units: 1
        memory:
          size: 2Gi
        storage:
          - size: 10Gi
    xion-ollama:
      resources:
        cpu:
          units: 4
        memory:
          size: 16Gi
        storage:
          - size: 60Gi
        # Accept common Akash NVIDIA cards so a solo operator gets bids while
        # preserving the real Gemma 4 floor latency target.
        gpu:
          units: 1
          attributes:
            vendor:
              nvidia:
                - model: rtx3090
                - model: rtx4090
                - model: a4000
                - model: a5000
                - model: a6000
                - model: l4
                - model: l40
                - model: a100
  placement:
    akash:
      pricing:
        xion-relay:
          denom: uact
          amount: 100
        xion-ollama:
          denom: uact
          amount: 10000
deployment:
  xion-relay:
    akash:
      profile: xion-relay
      count: 1
  xion-ollama:
    akash:
      profile: xion-ollama
      count: 1
