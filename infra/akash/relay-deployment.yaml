version: "2.0"
services:
  xion-relay:
    image: ghcr.io/nik190799/xion-relay:pre-genesis-akash
    expose:
      - port: 8443
        as: 443
        to:
          - global: true
    env:
      - XION_API_HOST=0.0.0.0
      - XION_API_PORT=8443
      - XION_API_WORKERS=1
      - XION_API_REQUIRE_BEARER=false
      - XION_BILLING_REQUIRED=false
      - XION_CAST_POOL_ON_BOOT=false
      - XION_PAYMENT_LEDGER=/app/data/PAYMENT_LEDGER.jsonl
      - XION_SENSORIUM_LEDGER=/app/data/SENSORIUM_LEDGER.jsonl
      - XION_SAFETY_LEDGER=/app/data/SAFETY_LEDGER.jsonl
      - XION_REQUEST_LEDGER=/app/data/REQUEST_LEDGER.jsonl
      - XION_ANCHOR_DB_PATH=/app/data/ANCHOR_LEDGER.jsonl
profiles:
  compute:
    xion-relay:
      resources:
        cpu:
          units: 1
        memory:
          size: 2Gi
        storage:
          size: 10Gi
  placement:
    dcloud:
      pricing:
        xion-relay:
          denom: uakt
          amount: 1000
deployment:
  xion-relay:
    dcloud:
      profile: xion-relay
      count: 1
