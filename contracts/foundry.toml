[profile.default]
src = "."
out = "out"
test = "test"
script = "script"
libs = ["lib"]
cache_path = "cache"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "paris"
bytecode_hash = "ipfs"
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/",
]

[profile.default.fuzz]
runs = 256

[profile.ci]
verbosity = 2
fuzz = { runs = 1024 }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
number_underscore = "thousands"
