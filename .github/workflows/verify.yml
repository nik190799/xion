name: xion-verify

# Every PR and every push to main must pass the constitutional verifier before
# any code is merged. This is not aspirational: the workflow runs
# `xion-verify --self-test` first so that a tampered verifier cannot pretend
# to validate anything else.
#
# Per DEVELOPMENT_ROADMAP.md:51, this file gates `--self-test && covenant &&
# invariants && soul && links`. We also run the pytest suite and the ruff
# lint so that doctrine hygiene and code hygiene move together.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    name: xion-verify (${{ matrix.os }} / Python ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12"]
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: xion-verify/pyproject.toml

      - name: Install xion-verify
        working-directory: xion-verify
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Self-test (MUST run before any other check)
        run: xion-verify --self-test

      - name: Constitutional hash witnesses
        run: |
          xion-verify covenant
          xion-verify invariants
          xion-verify soul
          xion-verify form
          xion-verify memory
          xion-verify resurrect
          xion-verify credentials
          xion-verify unknowns

      - name: Cross-reference integrity
        run: xion-verify links

      - name: Schemas ↔ doctrine cross-check (strict source_sha256)
        run: xion-verify schemas

      - name: Static cognition / drive-vector / state-chain checks
        run: |
          xion-verify cognition
          xion-verify drive-vector
          xion-verify state-chain

      - name: pytest
        working-directory: xion-verify
        run: pytest -q

      - name: ruff
        working-directory: xion-verify
        run: ruff check src tests
