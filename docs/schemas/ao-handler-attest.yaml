handler: attest
family: lifecycle
schema_version: 1
status: canonical
source_doctrine: docs/04-ARCHITECTURE.md
source_sha256: a61356ca6d430ac62c30d475db2d30df86846bb9411172e3923101ff1b69b8a9
operational_doctrine: docs/28-AO-CORE.md
operational_sha256: c21910eca1b192d14ff2f24dd84b4c8758ac5b5da7b6566736eac11241684145
args:
  - name: subject_address
    type: hex40
    required: true
  - name: event_kind
    type: enum
    values: [chat_turn, proposal_engagement, improvement_contribution]
    required: true
  - name: event_correlation_id
    type: hex32
    required: true
  - name: event_weight
    type: uint32
    required: true
  - name: event_timestamp
    type: uint64
    required: true
preconditions:
  - caller is hot-tier or warm-tier signer
  - event_weight <= MAX_EVENT_WEIGHT
state_changes:
  - "attestations[event_correlation_id] := {subject: subject_address, kind: event_kind, weight: event_weight, timestamp: event_timestamp}"
failure_modes:
  - non_authorised_caller -> reject
  - invalid_event_kind -> reject
  - weight_exceeds_cap -> reject
  - duplicate_correlation_id -> reject
