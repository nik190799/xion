handler: provision-witness
family: provisioning
schema_version: 1
status: canonical
source_doctrine: docs/04-ARCHITECTURE.md
source_sha256: a61356ca6d430ac62c30d475db2d30df86846bb9411172e3923101ff1b69b8a9
operational_doctrine: docs/28-AO-CORE.md
operational_sha256: c21910eca1b192d14ff2f24dd84b4c8758ac5b5da7b6566736eac11241684145
args:
  - name: provision_id
    tag: Provision-Id
    type: string
    required: true
  - name: target
    tag: Target
    type: string
    required: true
  - name: budget_cap
    tag: Budget-Cap
    type: integer
    required: true
  - name: manifest_sha256
    tag: Manifest-Sha256
    type: sha256
    required: true
preconditions:
  - caller is an authorized signer
  - budget_cap is positive
  - manifest_sha256 is a canonical lowercase 64-character digest
  - provision_id has not been used before
state_changes:
  - ProvisioningEvents[provision_id] records kind=witness, target, budget_cap, manifest_sha256, submitted_by
failure_modes:
  - non_authorised_caller -> reject + emit Provisioning-Rejection
  - missing_args -> reject + emit Provisioning-Rejection
  - invalid_args -> reject + emit Provisioning-Rejection
  - duplicate_provision_id -> reject + emit Provisioning-Rejection
