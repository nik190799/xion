handler: anchor-interaction-batch
family: lifecycle
schema_version: 1
status: canonical
source_doctrine: docs/04-ARCHITECTURE.md
source_sha256: a678a996aa30340d44c1fb17e654d2883a8b349e2b987b46f316ef2ac5f7cc40
operational_doctrine: docs/28-AO-CORE.md
operational_sha256: ef51b2c16a3d74d16ff2096651cbd2cf219491fef9cdf4c37a42ce67b0c106e5

# Phase 6.3 schema for the `Anchor-Interaction-Batch` AO handler.
# This handler receives the hourly Merkle roots from the orchestrator's
# AnchorDaemon and appends them to the AO process state, making Xion's
# interaction history verifiable against the public permaweb.
#
# At Phase 6.3 the only sink is LocalLedgerSink (writes to ANCHOR_LEDGER.jsonl
# locally). Phase 6.3.b ships AOCoreSink which posts these batches via this
# handler once Phase 6.1 substrate is unblocked (see KW-AOCORE-001 /
# KW-AOCORE-004 / KW-ANCHOR-AO-001).

handler_match:
  Action: Anchor-Interaction-Batch

args:
  - name: batch_root_sha256
    type: hex64
    required: true
    tag: Batch-Root-Sha256
  - name: batch_size
    type: uint32
    required: true
    tag: Batch-Size
  - name: period_start_unix
    type: uint64
    required: true
    tag: Period-Start-Unix
  - name: period_end_unix
    type: uint64
    required: true
    tag: Period-End-Unix
  - name: ledger_kind
    type: enum
    required: true
    tag: Ledger-Kind
    allowed: [request, payment, safety]

preconditions:
  - caller is hot-tier or warm-tier signer (AuthorizedSigners table)
  - batch_root_sha256 must be exactly 64 lowercase hex characters
  - batch_size must be a positive integer
  - period_end_unix must be strictly greater than period_start_unix
  - ledger_kind must be one of {request, payment, safety}

state_changes:
  - "AnchorBatches := AnchorBatches + {seq, batch_root_sha256, batch_size, period_start_unix, period_end_unix, ledger_kind}"

state_tip_emission: false

ledger_writes:
  - ANCHOR_LEDGER (off-chain mirror; Phase 6.3 LocalLedgerSink already writes this)

failure_modes:
  - non_authorised_caller -> reject + emit Anchor-Rejection
  - missing_args -> reject + emit Anchor-Rejection
  - invalid_args -> reject + emit Anchor-Rejection

emitted_messages:
  success:
    Action: Anchor-Recorded
    Tags:
      Batch-Root-Sha256: "echoes the incoming root"
  failure:
    Action: Anchor-Rejection
    Tags:
      Reason: "non_authorised_caller | missing_args | invalid_args"

deprecation_path:
  - replaced_by: anchor-interaction-batch-v2 (when?)
  - dual_write_window: 4 weeks min
