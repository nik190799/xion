handler: enter-hibernation
family: sustainability
schema_version: 1
status: canonical
source_doctrine: docs/04-ARCHITECTURE.md
source_sha256: a61356ca6d430ac62c30d475db2d30df86846bb9411172e3923101ff1b69b8a9
operational_doctrine: docs/28-AO-CORE.md
operational_sha256: c21910eca1b192d14ff2f24dd84b4c8758ac5b5da7b6566736eac11241684145
args:
  - name: hibernation_id
    tag: Hibernation-Id
    type: string
    required: true
  - name: reason
    tag: Reason
    type: string
    required: true
  - name: entered_at_unix
    tag: Entered-At-Unix
    type: integer
    required: true
preconditions:
  - caller is an authorized signer
  - Xion is not already hibernating
  - entered_at_unix parses as an integer
state_changes:
  - HibernationState.active is set true
  - HibernationEvents[hibernation_id] records an enter event
failure_modes:
  - non_authorised_caller -> reject + emit Sustainability-Rejection
  - missing_args -> reject + emit Sustainability-Rejection
  - invalid_args -> reject + emit Sustainability-Rejection
  - already_hibernating -> reject + emit Sustainability-Rejection
