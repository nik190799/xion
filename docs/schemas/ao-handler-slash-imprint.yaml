handler: slash-imprint
family: lifecycle
schema_version: 1
status: canonical
source_doctrine: docs/04-ARCHITECTURE.md
source_sha256: dda5d78f6d79a233dbd8966e2c9024f9c8ffd5587ee2dfceb48cbe7e257e5034
operational_doctrine: docs/28-AO-CORE.md
operational_sha256: ef51b2c16a3d74d16ff2096651cbd2cf219491fef9cdf4c37a42ce67b0c106e5
args:
  - name: slash_id
    tag: Slash-Id
    type: string
    required: true
  - name: subject_address
    tag: Subject-Address
    type: address
    required: true
  - name: amount
    tag: Amount
    type: integer
    required: true
  - name: evidence_sha256
    tag: Evidence-Sha256
    type: sha256
    required: true
preconditions:
  - caller is an authorized signer
  - amount is positive
  - evidence_sha256 is a canonical lowercase 64-character digest
  - slash_id has not been used before
state_changes:
  - ImprintSlashes[slash_id] records subject_address, amount, evidence_sha256, and approved_by
failure_modes:
  - non_authorised_caller -> reject + emit Imprint-Rejection
  - missing_args -> reject + emit Imprint-Rejection
  - invalid_args -> reject + emit Imprint-Rejection
  - duplicate_slash_id -> reject + emit Imprint-Rejection
