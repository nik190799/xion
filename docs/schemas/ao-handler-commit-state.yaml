handler: commit-state
family: lifecycle
schema_version: 1
status: doctrine_only
defer_to: Phase 6.1
source_doctrine: docs/04-ARCHITECTURE.md
source_sha256: ca0c441c2ef1a1abf2479ad224806e11f324b474182cb22d947b54f49cb0aef1
operational_doctrine: docs/28-AO-CORE.md
operational_sha256: ef51b2c16a3d74d16ff2096651cbd2cf219491fef9cdf4c37a42ce67b0c106e5
args:
  - name: state_root_sha256
    type: hex64
    required: true
  - name: tip_height
    type: uint64
    required: true
preconditions:
  - caller is hot-tier or warm-tier signer
  - tip_height == current_tip_height + 1
  - state_root_sha256 != current_state_root
state_changes:
  - "state_tip := {height: tip_height, root: state_root_sha256, prev: current_state_root}"
state_tip_emission: true
ledger_writes:
  - STATE_CHAIN_LEDGER (off-chain mirror)
failure_modes:
  - non_authorised_caller -> reject + emit STATE_REJECTION row
  - tip_height_skip -> reject + emit STATE_REJECTION row
  - duplicate_root -> reject (no-op)
deprecation_path:
  - replaced_by: commit-state-v2 (when?)
  - dual_write_window: 4 weeks min
