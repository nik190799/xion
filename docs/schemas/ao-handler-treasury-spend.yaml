handler: treasury-spend
family: lifecycle
schema_version: 1
status: canonical
source_doctrine: docs/04-ARCHITECTURE.md
source_sha256: 5829deabe95e3feae1ae708aa12df7373be5f49e7c68554cc96581650abbeb10
operational_doctrine: docs/28-AO-CORE.md
operational_sha256: ef51b2c16a3d74d16ff2096651cbd2cf219491fef9cdf4c37a42ce67b0c106e5
args:
  - name: spend_id
    tag: Spend-Id
    type: string
    required: true
  - name: amount
    tag: Amount
    type: integer
    required: true
  - name: asset
    tag: Asset
    type: string
    required: true
  - name: recipient
    tag: Recipient
    type: address
    required: true
  - name: purpose_sha256
    tag: Purpose-Sha256
    type: sha256
    required: true
  - name: chain_id
    tag: Chain-Id
    type: integer
    required: true
  - name: bridge_payload_sha256
    tag: Bridge-Payload-Sha256
    type: sha256
    required: true
preconditions:
  - caller is an authorized signer
  - amount is positive
  - purpose_sha256 is a canonical lowercase 64-character digest
  - chain_id is positive
  - bridge_payload_sha256 is a canonical lowercase 64-character digest
  - spend_id has not been used before
state_changes:
  - TreasurySpends[spend_id] records amount, asset, recipient, purpose_sha256, chain_id, bridge_event_id, bridge_payload_sha256, and approved_by
  - TreasuryBridgeEvents[bridge_event_id] records the AO-to-EVM treasury bridge event for BridgeAttestor verification
failure_modes:
  - non_authorised_caller -> reject + emit Treasury-Rejection
  - missing_args -> reject + emit Treasury-Rejection
  - invalid_args -> reject + emit Treasury-Rejection
  - duplicate_spend_id -> reject + emit Treasury-Rejection
