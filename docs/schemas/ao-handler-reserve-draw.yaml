handler: reserve-draw
family: sustainability
schema_version: 1
status: canonical
source_doctrine: docs/04-ARCHITECTURE.md
source_sha256: 688f679a2d62e28e7e119657aa0fb84febfe2a22674e352ac3c5adc5f9e285cf
operational_doctrine: docs/28-AO-CORE.md
operational_sha256: ef51b2c16a3d74d16ff2096651cbd2cf219491fef9cdf4c37a42ce67b0c106e5
args:
  - name: draw_id
    tag: Draw-Id
    type: string
    required: true
  - name: amount
    tag: Amount
    type: integer
    required: true
  - name: runway_days
    tag: Runway-Days
    type: integer
    required: true
  - name: purpose_sha256
    tag: Purpose-Sha256
    type: sha256
    required: true
preconditions:
  - caller is an authorized signer
  - amount is positive
  - runway_days is non-negative
  - purpose_sha256 is a canonical lowercase 64-character digest
  - draw_id has not been used before
state_changes:
  - ReserveDraws[draw_id] records amount, runway_days, purpose_sha256, and approved_by
failure_modes:
  - non_authorised_caller -> reject + emit Sustainability-Rejection
  - missing_args -> reject + emit Sustainability-Rejection
  - invalid_args -> reject + emit Sustainability-Rejection
  - duplicate_draw_id -> reject + emit Sustainability-Rejection
