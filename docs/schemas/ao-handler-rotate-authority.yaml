handler: rotate-authority
family: authority
schema_version: 1
status: canonical
source_doctrine: docs/04-ARCHITECTURE.md
source_sha256: a61356ca6d430ac62c30d475db2d30df86846bb9411172e3923101ff1b69b8a9
operational_doctrine: docs/28-AO-CORE.md
operational_sha256: c21910eca1b192d14ff2f24dd84b4c8758ac5b5da7b6566736eac11241684145
args:
  - name: tier
    tag: Tier
    type: string
    required: true
    allowed: [hot, warm, cold, witness]
  - name: old_address
    tag: Old-Address
    type: address
    required: true
  - name: new_address
    tag: New-Address
    type: address
    required: true
  - name: rotation_nonce
    tag: Rotation-Nonce
    type: string
    required: true
  - name: effective_unix
    tag: Effective-Unix
    type: integer
    required: true
preconditions:
  - caller is an authorized signer
  - old_address is currently authorized
  - old_address and new_address differ
  - rotation_nonce has not been used before
state_changes:
  - AuthorizedSigners[old_address] is cleared
  - AuthorizedSigners[new_address] is set true
  - AuthorityRotations[rotation_nonce] records tier, old_address, new_address, effective_unix, rotated_by
failure_modes:
  - non_authorised_caller -> reject + emit Authority-Rejection
  - missing_args -> reject + emit Authority-Rejection
  - invalid_args -> reject + emit Authority-Rejection
  - no_rotation -> reject + emit Authority-Rejection
  - old_authority_unknown -> reject + emit Authority-Rejection
  - duplicate_rotation_nonce -> reject + emit Authority-Rejection
