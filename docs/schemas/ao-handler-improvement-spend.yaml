handler: improvement-spend
family: sustainability
schema_version: 1
status: canonical
source_doctrine: docs/04-ARCHITECTURE.md
source_sha256: a61356ca6d430ac62c30d475db2d30df86846bb9411172e3923101ff1b69b8a9
operational_doctrine: docs/28-AO-CORE.md
operational_sha256: c21910eca1b192d14ff2f24dd84b4c8758ac5b5da7b6566736eac11241684145
args:
  - name: proposal_id
    tag: Proposal-Id
    type: string
    required: true
  - name: amount
    tag: Amount
    type: integer
    required: true
  - name: recipient
    tag: Recipient
    type: address
    required: true
  - name: purpose_sha256
    tag: Purpose-Sha256
    type: sha256
    required: true
preconditions:
  - caller is an authorized signer
  - amount is positive
  - purpose_sha256 is a canonical lowercase 64-character digest
  - proposal_id has not been spent before
state_changes:
  - ImprovementSpends[proposal_id] records amount, recipient, purpose_sha256, and approved_by
failure_modes:
  - non_authorised_caller -> reject + emit Sustainability-Rejection
  - missing_args -> reject + emit Sustainability-Rejection
  - invalid_args -> reject + emit Sustainability-Rejection
  - duplicate_proposal_id -> reject + emit Sustainability-Rejection
