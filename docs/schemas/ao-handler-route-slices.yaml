handler: route-slices
family: sustainability
schema_version: 1
status: canonical
source_doctrine: docs/04-ARCHITECTURE.md
source_sha256: a61356ca6d430ac62c30d475db2d30df86846bb9411172e3923101ff1b69b8a9
operational_doctrine: docs/28-AO-CORE.md
operational_sha256: c21910eca1b192d14ff2f24dd84b4c8758ac5b5da7b6566736eac11241684145
args:
  - name: payment_id
    tag: Payment-Id
    type: string
    required: true
  - name: gross_amount
    tag: Gross-Amount
    type: integer
    required: true
  - name: operations_bps
    tag: Operations-Bps
    type: integer
    required: true
  - name: improvement_bps
    tag: Improvement-Bps
    type: integer
    required: true
  - name: reserve_bps
    tag: Reserve-Bps
    type: integer
    required: true
  - name: foundation_bps
    tag: Foundation-Bps
    type: integer
    required: true
  - name: rewards_bps
    tag: Rewards-Bps
    type: integer
    required: true
preconditions:
  - caller is an authorized signer
  - gross_amount is positive
  - basis-point slices sum exactly to 10000
  - payment_id has not been routed before
state_changes:
  - SliceRoutes[payment_id] records gross amount, five-slice basis points, and routed_by
failure_modes:
  - non_authorised_caller -> reject + emit Sustainability-Rejection
  - missing_args -> reject + emit Sustainability-Rejection
  - invalid_args -> reject + emit Sustainability-Rejection
  - slice_total_mismatch -> reject + emit Sustainability-Rejection
  - duplicate_payment_id -> reject + emit Sustainability-Rejection
