handler: registry-update
family: lifecycle
schema_version: 1
status: canonical
source_doctrine: docs/04-ARCHITECTURE.md
source_sha256: a61356ca6d430ac62c30d475db2d30df86846bb9411172e3923101ff1b69b8a9
operational_doctrine: docs/28-AO-CORE.md
operational_sha256: c21910eca1b192d14ff2f24dd84b4c8758ac5b5da7b6566736eac11241684145
args:
  - name: registry
    tag: Registry
    type: string
    required: true
    allowed: [relay, inference, storage, witness, authority]
  - name: entry_id
    tag: Entry-Id
    type: string
    required: true
  - name: entry_sha256
    tag: Entry-Sha256
    type: sha256
    required: true
  - name: update_nonce
    tag: Update-Nonce
    type: string
    required: true
preconditions:
  - caller is an authorized signer
  - registry is one of the allowed registry namespaces
  - entry_sha256 is a canonical lowercase 64-character digest
  - update_nonce has not been used before
state_changes:
  - RegistryUpdates[update_nonce] records registry, entry_id, entry_sha256, and updated_by
failure_modes:
  - non_authorised_caller -> reject + emit Registry-Rejection
  - missing_args -> reject + emit Registry-Rejection
  - invalid_args -> reject + emit Registry-Rejection
  - duplicate_update_nonce -> reject + emit Registry-Rejection
