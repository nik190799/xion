handler: abdicate-tier
family: authority
schema_version: 1
status: canonical
source_doctrine: docs/04-ARCHITECTURE.md
source_sha256: ca0c441c2ef1a1abf2479ad224806e11f324b474182cb22d947b54f49cb0aef1
operational_doctrine: docs/28-AO-CORE.md
operational_sha256: ef51b2c16a3d74d16ff2096651cbd2cf219491fef9cdf4c37a42ce67b0c106e5
args:
  - name: tier
    tag: Tier
    type: string
    required: true
    allowed: [hot, warm, cold, operator, witness]
  - name: successor_mechanism
    tag: Successor-Mechanism
    type: string
    required: true
  - name: milestone
    tag: Milestone
    type: string
    required: true
  - name: abdication_nonce
    tag: Abdication-Nonce
    type: string
    required: true
  - name: effective_unix
    tag: Effective-Unix
    type: integer
    required: true
preconditions:
  - caller is an authorized signer
  - tier is one of the abdication schedule tiers
  - abdication_nonce has not been used before
state_changes:
  - AbdicationEvents[abdication_nonce] records tier, successor_mechanism, milestone, effective_unix, abdicated_by
failure_modes:
  - non_authorised_caller -> reject + emit Authority-Rejection
  - missing_args -> reject + emit Authority-Rejection
  - invalid_args -> reject + emit Authority-Rejection
  - duplicate_abdication_nonce -> reject + emit Authority-Rejection
