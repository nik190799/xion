handler: accept-donation
family: sustainability
schema_version: 1
status: canonical
source_doctrine: docs/04-ARCHITECTURE.md
source_sha256: a61356ca6d430ac62c30d475db2d30df86846bb9411172e3923101ff1b69b8a9
operational_doctrine: docs/28-AO-CORE.md
operational_sha256: c21910eca1b192d14ff2f24dd84b4c8758ac5b5da7b6566736eac11241684145
args:
  - name: donation_id
    tag: Donation-Id
    type: string
    required: true
  - name: donor
    tag: Donor
    type: address
    required: true
  - name: amount_usd
    tag: Amount-Usd
    type: integer
    required: true
  - name: asset
    tag: Asset
    type: string
    required: true
  - name: imprint_credit
    tag: Imprint-Credit
    type: integer
    required: false
preconditions:
  - caller is an authorized signer
  - amount_usd is positive
  - imprint_credit, when present, is non-negative
  - donation_id has not been accepted before
state_changes:
  - FoundationDonations[donation_id] records donor, amount_usd, asset, imprint_credit, and accepted_by
failure_modes:
  - non_authorised_caller -> reject + emit Sustainability-Rejection
  - missing_args -> reject + emit Sustainability-Rejection
  - invalid_args -> reject + emit Sustainability-Rejection
  - duplicate_donation_id -> reject + emit Sustainability-Rejection
