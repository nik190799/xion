schema_version: 1
source_doctrine: docs/HERMES_PIN_PROTOCOL.md
source_sha256: a54c25575ea28485ad1bf0d60d65ad7ebcd0b004687feb9e73b0dc9117da6cac
status: canonical
property: append-only cast ledger row contract
required_fields:
  - schema_version
  - event
  - agent_id
  - agent_soul_hash
  - parent_soul_hash
  - hermes_pin
  - cast_at
  - smoke_test_pass
events:
  - cast_succeeded
  - cast_failed
field_shapes:
  schema_version: integer
  event: enum[cast_succeeded, cast_failed]
  agent_id: kebab-case string
  agent_soul_hash: 64-character hex SHA-256
  parent_soul_hash: 64-character hex SHA-256
  hermes_pin: commit identifier string
  cast_at: ISO-8601 UTC timestamp
  smoke_test_pass: boolean
  reason: optional string for cast_failed
constraints:
  - agent_id must not be arbiter
  - agent_soul_hash must match the current content hash for the named Agent Soul unless the row is historical
  - parent_soul_hash must match the Soul hash declared by the Agent Soul
  - cast_failed rows must include reason
deprecation_path:
  - replaced_by: AGENT_CAST_LEDGER v2 only with dual-write and verifier support
