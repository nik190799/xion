handler: exit-hibernation
family: sustainability
schema_version: 1
status: canonical
source_doctrine: docs/04-ARCHITECTURE.md
source_sha256: b681a79603018d629b8adfbae4b0a72c19d5c44d8ff2129311f07157a2c12ed9
operational_doctrine: docs/28-AO-CORE.md
operational_sha256: ef51b2c16a3d74d16ff2096651cbd2cf219491fef9cdf4c37a42ce67b0c106e5
args:
  - name: hibernation_id
    tag: Hibernation-Id
    type: string
    required: true
  - name: exit_reason
    tag: Exit-Reason
    type: string
    required: true
  - name: exited_at_unix
    tag: Exited-At-Unix
    type: integer
    required: true
preconditions:
  - caller is an authorized signer
  - Xion is currently hibernating
  - exited_at_unix parses as an integer
state_changes:
  - HibernationState.active is set false
  - HibernationEvents[hibernation_id] records an exit event
failure_modes:
  - non_authorised_caller -> reject + emit Sustainability-Rejection
  - missing_args -> reject + emit Sustainability-Rejection
  - invalid_args -> reject + emit Sustainability-Rejection
  - not_hibernating -> reject + emit Sustainability-Rejection
